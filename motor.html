<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Control - CaddyMate</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="motor.css">
</head>
<body>
    <div class="container motor-container">
        <div class="header">
            <button class="back-button" onclick="window.location.href='home.html'">
                <span>← Back</span>
            </button>
            <h1>Motor Control</h1>
        </div>

        <div class="mode-controls" role="group" aria-label="Select motor mode">
            <button
                type="button"
                class="mode-button is-active"
                data-mode="manual"
            >
                Manual
            </button>
            <button
                type="button"
                class="mode-button"
                data-mode="loading"
            >
                Loading
            </button>
            <button
                type="button"
                class="mode-button"
                data-mode="unloading"
            >
                Unloading
            </button>
        </div>

        <div class="motor-controls" role="group" aria-label="Move base up or down">
            <button
                type="button"
                class="direction-button"
                data-direction="up"
                aria-label="Spin motor up while held"
            >
                <span aria-hidden="true">&#9650;</span>
            </button>
            <button
                type="button"
                class="direction-button"
                data-direction="down"
                aria-label="Spin motor down while held"
            >
                <span aria-hidden="true">&#9660;</span>
            </button>
        </div>

        <p id="motor-status" class="motor-status" aria-live="polite">Motor idle</p>
    </div>

    <script>
        (function () {
            const statusEl = document.getElementById('motor-status');
            const modeStatusEl = document.getElementById('mode-status');
            const modeButtons = document.querySelectorAll('.mode-button');
            const directionButtons = document.querySelectorAll('.direction-button');
            let activeDirection = null;
            let activeMode = 'manual';
            let modeChangeInFlight = false;
            const blockedDirections = {
                up: false,
                down: false,
            };

            const MODE_LABELS = {
                manual: 'Manual',
                loading: 'Loading',
                unloading: 'Unloading',
            };

            const MAX_RETRIES = 3;
            const RETRY_DELAY_MS = 100;
            const STATE_POLL_INTERVAL_MS = 200;
            let statePollTimer = null;

            function setStatus(message, isError) {
                statusEl.textContent = message;
                statusEl.classList.toggle('motor-status-error', !!isError);
            }

            function formatMotorError(message, requestedDirection) {
                if (!message) {
                    return 'Motor command failed';
                }

                const softwareLimitMatch = message.match(/Software limit reached for\s+(UP|DOWN)/i);
                if (softwareLimitMatch) {
                    const requested = (requestedDirection || '').toLowerCase();
                    const requestedLabel = requested ? requested : softwareLimitMatch[1].toLowerCase();
                    return 'Cannot move ' + requestedLabel + ': platform is already at its travel limit.';
                }

                if (message.toLowerCase().includes('communication error')) {
                    return 'Motor controller communication issue. Please try again.';
                }

                return message;
            }

            function getSoftwareLimitDirection(message, requestedDirection) {
                if (!message) {
                    return null;
                }

                const softwareLimitMatch = message.match(/Software limit reached for\s+(UP|DOWN)/i);
                if (softwareLimitMatch) {
                    return softwareLimitMatch[1].toLowerCase();
                }

                const requested = (requestedDirection || '').toLowerCase();
                if (message.toLowerCase().includes('travel limit') && (requested === 'up' || requested === 'down')) {
                    return requested;
                }

                return null;
            }

            function setDirectionBlocked(direction, isBlocked) {
                if (!direction || !(direction in blockedDirections)) {
                    return;
                }

                blockedDirections[direction] = !!isBlocked;
                const button = document.querySelector('.direction-button[data-direction="' + direction + '"]');
                if (!button) {
                    return;
                }

                button.classList.toggle('is-blocked', !!isBlocked);
                button.disabled = !!isBlocked;
                button.setAttribute('aria-disabled', isBlocked ? 'true' : 'false');
            }

            function clearBlockedDirections() {
                setDirectionBlocked('up', false);
                setDirectionBlocked('down', false);
            }

            function isDirectionBlockedByState(state, direction) {
                if (!state || !direction) {
                    return false;
                }

                if (direction === 'up') {
                    return !!state.at_limit_up;
                }
                if (direction === 'down') {
                    return !!state.at_limit_down;
                }

                return false;
            }

            function applyLimitState(state) {
                if (!state) {
                    return;
                }

                setDirectionBlocked('up', !!state.at_limit_up);
                setDirectionBlocked('down', !!state.at_limit_down);
            }

            async function fetchMotorState() {
                return retryWithExponentialBackoff(async function () {
                    const response = await fetch('/api/motor/state', {
                        method: 'GET',
                        cache: 'no-store',
                    });

                    if (!response.ok) {
                        const payload = await response.json().catch(function () { return {}; });
                        throw new Error(payload.error || 'Motor state fetch failed');
                    }

                    return response.json();
                });
            }

            function stopStatePolling() {
                if (statePollTimer === null) {
                    return;
                }
                clearInterval(statePollTimer);
                statePollTimer = null;
            }

            function startStatePolling() {
                if (statePollTimer !== null) {
                    return;
                }

                statePollTimer = setInterval(function () {
                    if (activeDirection === null) {
                        return;
                    }

                    fetchMotorState()
                        .then(function (state) {
                            applyLimitState(state);

                            if (activeDirection !== null && state.running_direction === null) {
                                const stoppedDirection = activeDirection;
                                activeDirection = null;
                                document.querySelector('.direction-button[data-direction="' + stoppedDirection + '"]').classList.remove('is-active');

                                if (isDirectionBlockedByState(state, stoppedDirection)) {
                                    setStatus('Cannot move ' + stoppedDirection + ': platform is already at its travel limit.', true);
                                } else {
                                    setStatus('Motor idle', false);
                                }
                            }
                        })
                        .catch(function () {
                            // Keep polling through transient network/controller errors.
                        });
                }, STATE_POLL_INTERVAL_MS);
            }

            async function retryWithExponentialBackoff(fn, maxRetries = MAX_RETRIES) {
                let lastError;
                for (let attempt = 1; attempt <= maxRetries; attempt++) {
                    try {
                        return await fn();
                    } catch (error) {
                        lastError = error;
                        if (attempt < maxRetries) {
                            const delayMs = RETRY_DELAY_MS * attempt;
                            await new Promise(function (resolve) { setTimeout(resolve, delayMs); });
                        }
                    }
                }
                throw lastError;
            }

            async function sendMotorCommand(action, direction) {
                const endpoint = action === 'start' ? '/api/motor/start' : '/api/motor/stop';
                const body = action === 'start' ? { direction: direction } : {};

                return retryWithExponentialBackoff(async function () {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(body),
                        keepalive: action === 'stop',
                    });

                    if (!response.ok) {
                        const payload = await response.json().catch(function () { return {}; });
                        throw new Error(payload.error || 'Motor command failed');
                    }
                });
            }

            async function sendMotorMode(mode) {
                return retryWithExponentialBackoff(async function () {
                    const response = await fetch('/api/motor/mode', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ mode: mode }),
                    });

                    if (!response.ok) {
                        const payload = await response.json().catch(function () { return {}; });
                        throw new Error(payload.error || 'Mode change failed');
                    }
                });
            }

            function setActiveMode(mode) {
                modeButtons.forEach(function (button) {
                    button.classList.toggle('is-active', button.dataset.mode === mode);
                });
            }

            function setModeStatus(mode) {
                if (!modeStatusEl) {
                    return;
                }
                modeStatusEl.textContent = 'Mode: ' + (MODE_LABELS[mode] || mode);
            }

            async function handleModeSelect(mode) {
                if (modeChangeInFlight || mode === activeMode) {
                    return;
                }

                const previousMode = activeMode;
                modeChangeInFlight = true;
                activeMode = mode;
                setActiveMode(mode);
                setModeStatus(mode);

                try {
                    await sendMotorMode(mode);
                    setModeStatus(mode);
                } catch (error) {
                    activeMode = previousMode;
                    setActiveMode(previousMode);
                    setModeStatus(previousMode);
                    setStatus(error.message, true);
                } finally {
                    modeChangeInFlight = false;
                }
            }

            async function handlePress(direction) {
                if (activeDirection === direction) {
                    return;
                }

                if (blockedDirections[direction]) {
                    setStatus('Cannot move ' + direction + ': platform is already at its travel limit.', true);
                    return;
                }

                if (activeDirection !== null && activeDirection !== direction) {
                    await handleRelease(activeDirection);
                }

                activeDirection = direction;
                document.querySelector('.direction-button[data-direction="' + direction + '"]').classList.add('is-active');
                setStatus('Motor running ' + direction + '...', false);

                try {
                    await sendMotorCommand('start', direction);
                    clearBlockedDirections();
                    startStatePolling();
                } catch (error) {
                    activeDirection = null;
                    document.querySelector('.direction-button[data-direction="' + direction + '"]').classList.remove('is-active');
                    const blockedDirection = getSoftwareLimitDirection(error.message, direction);
                    if (blockedDirection) {
                        setDirectionBlocked(blockedDirection, true);
                    }
                    setStatus(formatMotorError(error.message, direction), true);
                }
            }

            async function handleRelease(direction) {
                if (activeDirection !== direction) {
                    return;
                }

                activeDirection = null;
                document.querySelector('.direction-button[data-direction="' + direction + '"]').classList.remove('is-active');

                try {
                    await sendMotorCommand('stop');
                    stopStatePolling();
                    fetchMotorState()
                        .then(function (state) {
                            applyLimitState(state);
                        })
                        .catch(function () {});
                    setStatus('Motor idle', false);
                } catch (error) {
                    setStatus(formatMotorError(error.message), true);
                }
            }

            directionButtons.forEach(function (button) {
                const direction = button.dataset.direction;

                button.addEventListener('pointerdown', function (event) {
                    event.preventDefault();
                    button.setPointerCapture(event.pointerId);
                    handlePress(direction);
                });

                button.addEventListener('pointerup', function () {
                    handleRelease(direction);
                });

                button.addEventListener('pointercancel', function () {
                    handleRelease(direction);
                });

                button.addEventListener('lostpointercapture', function () {
                    handleRelease(direction);
                });

                button.addEventListener('contextmenu', function (event) {
                    event.preventDefault();
                });
            });

            modeButtons.forEach(function (button) {
                const mode = button.dataset.mode;

                button.addEventListener('click', function () {
                    handleModeSelect(mode);
                });
            });

            setModeStatus(activeMode);
            // System starts at top travel limit, so block UP immediately until backend state confirms.
            setDirectionBlocked('up', true);
            fetchMotorState()
                .then(function (state) {
                    applyLimitState(state);
                })
                .catch(function () {});

            document.addEventListener('visibilitychange', function () {
                if (document.hidden && activeDirection !== null) {
                    handleRelease(activeDirection);
                } else if (!document.hidden) {
                    fetchMotorState()
                        .then(function (state) {
                            applyLimitState(state);
                        })
                        .catch(function () {});
                }
            });

            window.addEventListener('beforeunload', function () {
                if (activeDirection !== null) {
                    sendMotorCommand('stop').catch(function () {});
                }
            });
        })();
    </script>
</body>
</html>
